<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能体平台 - 测试页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #00796B;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .status h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        .test-section {
            margin: 20px 0;
        }
        .test-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        button {
            background: #00796B;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background: #00695C;
        }
        .result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .link-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .link-section a {
            color: #00796B;
            text-decoration: none;
            display: inline-block;
            margin: 5px 10px 5px 0;
            padding: 8px 16px;
            border: 1px solid #00796B;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .link-section a:hover {
            background: #00796B;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 AI智能体平台</h1>
        <p class="subtitle">后端服务已成功启动</p>

        <div class="status">
            <h3>✅ 服务状态</h3>
            <p>• 后端API: <strong>运行中</strong> (http://localhost:8000)</p>
            <p>• 数据库: <strong>运行中</strong> (MySQL)</p>
            <p>• 初始管理员: admin / admin123</p>
        </div>

        <div class="test-section">
            <h3>快速测试</h3>
            <button onclick="testAPI()">测试API连接</button>
            <button onclick="testLogin()">测试登录</button>
            <button onclick="testDocs()">打开API文档</button>
            <div id="result" class="result" style="display:none;"></div>
        </div>

        <div class="link-section">
            <h3>相关链接</h3>
            <a href="http://localhost:8000/docs" target="_blank">📚 API文档 (Swagger)</a>
            <a href="http://localhost:8000/redoc" target="_blank">📖 API文档 (ReDoc)</a>
        </div>

        <div class="link-section">
            <h3>项目文档</h3>
            <p style="color: #666; font-size: 14px; margin-top: 10px;">
                查看项目根目录下的以下文档：<br>
                • README.md - 项目介绍<br>
                • API_EXAMPLES.md - API使用示例<br>
                • ARCHITECTURE.md - 架构说明<br>
                • DEPLOY.md - 部署文档
            </p>
        </div>
    </div>

    <script>
        function showResult(text) {
            const result = document.getElementById('result');
            result.style.display = 'block';
            result.textContent = text;
        }

        async function testAPI() {
            try {
                const response = await fetch('http://localhost:8000/');
                const data = await response.json();
                showResult('✅ API连接成功！\n\n' + JSON.stringify(data, null, 2));
            } catch (error) {
                showResult('❌ API连接失败：\n\n' + error.message);
            }
        }

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                const data = await response.json();
                if (data.access_token) {
                    showResult('✅ 登录成功！\n\nToken: ' + data.access_token.substring(0, 50) + '...');
                } else {
                    showResult('❌ 登录失败：\n\n' + JSON.stringify(data, null, 2));
                }
            } catch (error) {
                showResult('❌ 登录请求失败：\n\n' + error.message);
            }
        }

        function testDocs() {
            window.open('http://localhost:8000/docs', '_blank');
        }
    </script>
</body>
</html>
