name: Deploy Vue project to GitHub Pages

on:
  push:
    branches: ['master']   # 你的主分支名

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web   # 所有 run 命令默认在 ./web 下执行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean cache and dist
        run: rm -rf dist node_modules/.vite   # 不需要再写 working-directory

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check index.html base path
        run: cat dist/index.html | grep -o 'src="/[^"]*"'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'   # 注意：这里需要相对于仓库根目录的路径，因为 upload-pages-artifact 不在 defaults 作用域内

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4