name: Deploy Vue project to GitHub Pages

on:
  push:
    branches: ['main']   # 根据你的默认分支修改

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web   # 👈 所有 run 步骤默认在此目录下执行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'        # 改为你的 Node 版本

      - name: Install dependencies
        run: npm ci                 # 或 yarn install

      - name: Build project
        run: npm run build          # 或 yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'        # 👈 修改为子目录下的构建产物路径

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4